services:
  minio:
    image: minio/minio:latest
    container_name: captraw-minio
    environment:
      MINIO_ROOT_USER: Capt-Docs
      MINIO_ROOT_PASSWORD: "12345678"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-setup:
    image: minio/mc:latest
    container_name: captraw-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 Capt-Docs 12345678 &&
      mc mb --ignore-existing local/Capt-Docs-Storage &&
      mc anonymous set none local/Capt-Docs-Storage &&
      echo 'MinIO bucket setup completed.'
      "
    restart: "no"

volumes:
  minio_data:

